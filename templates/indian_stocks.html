{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 mt-2">
    <h1 class="gradient-text">Indian Stocks Monitor</h1>
    <span class="badge bg-primary fs-6">NIFTY 50 / SENSEX Trackers</span>
</div>

<div class="card shadow mb-4">
    <div class="card-header d-flex flex-column flex-md-row justify-content-between align-items-md-center">
        <h5 class="mb-2 mb-md-0">Major Movers</h5>
        <input type="text" id="tableSearch" class="form-control form-control-sm w-100" style="max-width: 300px;" placeholder="Search Ticker...">
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle text-nowrap" id="indianStocksTable">
                <thead class="table-dark">
                    <tr>
                        <th>Symbol</th>
                        <th>Name Prefix</th>
                        <th>Current Price (₹)</th>
                        <th>Change %</th>
                    </tr>
                </thead>
                <tbody id="indianStocksBody">
                    <tr>
                        <td colspan="4" class="text-center py-4">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Fetching live feed from NSE/BSE...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
